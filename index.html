<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập quản trị</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://cdn.hstatic.net/files/1000381168/file/hd-login2_87caa7b7872c4a5385c1b34e810069fa.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: transparent;
            padding: 15px;
            margin-top: -400px;
            width: 100%;
            max-width: 260px; /* Nhỏ gọn hơn */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo {
            width: 130px; /* Thu nhỏ logo */
            margin-bottom: 5px;
        }
        .login-subtitle {
            font-size: 9px;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        .form-group {
            width: 100%;
            margin-bottom: 10px;
        }
        /* No labels in the screenshot, just placeholders */
        label {
            display: none;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 8px 10px; /* Giảm padding */
            border: 1px solid #ddd;
            border-radius: 3px;
            box-sizing: border-box;
            background-color: white;
            font-size: 11px; /* Chữ nhỏ hơn */
        }
        button {
            width: 100%;
            padding: 8px 10px; /* Giảm padding */
            background-color: #1ab394;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 5px;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #16a085;
        }
        .error-msg {
            color: #d93025;
            font-size: 11px;
            margin-bottom: 10px;
            text-align: center;
            display: none;
            width: 100%;
        }
        .copyright {
            margin-top: 15px;
            font-size: 9px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-container">
    <img src="https://cdn.hstatic.net/files/1000381168/file/logo_tgkc.png" alt="Logo" class="logo">
    <div class="login-subtitle">Login in to see Admin Control Panel.</div>
    
    <div class="error-msg" id="errorMsg">Sai tài khoản hoặc mật khẩu!</div>

    <div class="form-group">
        <label for="username">Tên đăng nhập</label>
        <input type="text" id="username" placeholder="Username">
    </div>
    <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="Password">
    </div>
    
    <button onclick="login()">Log in</button>

    <div class="copyright">Copyright(c) TGKC @ 2026 All Rights Reserved.</div>
</div>

<script>
    function login() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('errorMsg');

        if (user === 'admin' && pass === 'Admin@123') {
            sessionStorage.setItem('isAdminLoggedIn', 'true');
            window.location.href = 'admin.html';
        } else {
            errorMsg.style.display = 'block';
        }
    }

    // Cho phép ấn Enter để đăng nhập
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            login();
        }
    });
</script>

</body>
</html>
