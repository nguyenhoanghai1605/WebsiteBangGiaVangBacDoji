<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị Hệ thống Trình Chiếu DOJI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #D4AF37; /* DOJI Gold */
            --primary-hover: #C5A028;
            --secondary-color: #8B0000; /* DOJI Ruby Red */
            --text-main: #333333;
            --text-muted: #666666;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.1), transparent 600px),
                              radial-gradient(circle at bottom left, rgba(139, 0, 0, 0.05), transparent 600px);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Tăng kích thước khung quản trị cho rộng hơn */
        .admin-container {
            background-color: var(--card-bg);
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 900px; /* Rộng hơn */
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .admin-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--secondary-color) 0%, var(--primary-color) 50%, var(--secondary-color) 100%);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 25px;
        }

        h2 {
            color: var(--text-main);
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logout-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            width: 200px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background-color: #fff1f0;
            color: #ff4d4f;
            border-color: #ffa39e;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 16px;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            color: var(--text-main);
            transition: all 0.3s ease;
            background-color: #fafafa;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.2);
            background-color: #fff;
        }

        .hint {
            display: block;
            margin-top: 10px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .button-group {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            flex: 1;
            min-width: 200px;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.4);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--secondary-color);
            border: 2px solid var(--secondary-color);
        }

        .btn-secondary:hover {
            background-color: var(--secondary-color);
            color: white;
            transform: translateY(-2px);
        }
        
        .btn-info {
            background-color: #f0f2f5;
            color: #333;
            border: 1px solid #d9d9d9;
        }
        
        .btn-info:hover {
            background-color: #e6e8eb;
            border-color: #c0c0c0;
        }

        .success-msg {
            background-color: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #389e0d;
            padding: 16px 20px;
            border-radius: 8px;
            margin-top: 25px;
            font-size: 15px;
            font-weight: 500;
            display: none;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .success-msg svg {
            margin-right: 10px;
            width: 20px;
            height: 20px;
        }

        /* Modal / Popup cho Lịch sử */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: white;
            width: 90%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 85vh;
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fafafa;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 20px;
            color: var(--secondary-color);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            line-height: 1;
        }

        .close-modal:hover {
            color: #000;
        }

        .modal-body {
            padding: 25px;
            overflow-y: auto;
        }

        /* Table styles */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: var(--text-main);
            position: sticky;
            top: 0;
        }
        
        td {
            font-size: 14px;
            color: #444;
            word-break: break-all;
        }

        tr:hover td {
            background-color: #fcfcfc;
        }

        .empty-history {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            fill: currentColor;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            font-weight: 500;
        }
        
        .footer span {
            color: var(--primary-color);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-actions">
        <h2>Bảng Cấu Hình Màn Hình DOJI</h2>
        <button class="logout-btn" onclick="logout()">Đăng xuất</button>
    </div>
    
    <div class="form-group">
        <label for="videoUrl">Đường dẫn Video Trình Chiếu (URL MP4)</label>
        <div class="input-wrapper">
            <input type="text" id="videoUrl" placeholder="Nhập link video mới (VD: https://domain.com/video.mp4)">
        </div>
        <span class="hint">Video sẽ được tự động lặp lại trên màn hình chính. Thay đổi sẽ có hiệu lực ngay lập tức.</span>
    </div>
    
    <div class="button-group">
        <button class="btn btn-primary" onclick="saveConfig()">
            <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 21H5C4.44772 21 4 20.5523 4 20V4C4 3.44772 4.44772 3 5 3H16L20 7V20C20 20.5523 19.5523 21 19 21ZM18 8H15V5H6V19H18V8ZM8 15H16V17H8V15ZM8 11H16V13H8V11ZM9 6H13V9H9V6Z"/></svg>
            Lưu cấu hình
        </button>
        <button class="btn btn-info" onclick="openHistoryModal()">
            <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C17.52 2 22 6.48 22 12C22 17.52 17.52 22 12 22C6.48 22 2 17.52 2 12C2 6.48 6.48 2 12 2ZM12 20C16.42 20 20 16.42 20 12C20 7.58 16.42 4 12 4C7.58 4 4 7.58 4 12C4 16.42 7.58 20 12 20ZM12.5 7V12.25L17 14.92L16.25 16.15L11 13V7H12.5Z"/></svg>
            Lịch sử thay đổi
        </button>
        <a href="home.html" target="_blank" class="btn btn-secondary">
            <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M15 3L21 3V9L15 3ZM14 3L14 10L21 10V20C21 20.5523 20.5523 21 20 21H4C3.44772 21 3 20.5523 3 20V4C3 3.44772 3.44772 3 4 3H14ZM19 12L12.5 12L12.5 5.5L19 12Z" fill="currentColor"/></svg>
            Xem bảng giá
        </a>
    </div>

    <div class="success-msg" id="successMsg">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22ZM11.0026 16L18.0737 8.92893L16.6595 7.51472L11.0026 13.1716L8.17421 10.3431L6.76 11.7574L11.0026 16Z" fill="currentColor"/></svg>
        Đã lưu cấu hình thành công! Trang trình chiếu sẽ tự động cập nhật.
    </div>

    <div class="footer">
        Designed by <span>Nguyễn Hoàng Hải</span>
    </div>
</div>

<!-- Modal Lịch sử -->
<div class="modal-overlay" id="historyModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Lịch sử thay đổi cấu hình (30 ngày gần nhất)</h3>
            <button class="close-modal" onclick="closeHistoryModal()">&times;</button>
        </div>
        <div class="modal-body">
            <table>
                <thead>
                    <tr>
                        <th style="width: 25%">Thời gian</th>
                        <th style="width: 75%">Link Video</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    <!-- Dữ liệu lịch sử sẽ được chèn vào đây -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Kiểm tra đăng nhập
    if (sessionStorage.getItem('isAdminLoggedIn') !== 'true') {
        window.location.href = 'login.html';
    }

    const defaultVideoUrl = 'https://cdn.hstatic.net/files/1000381168/file/tgkc_3clip.mp4';
    const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyF92Nc-WqbaXGQYPYF9PfX4uQBTCaCZqxMnl7WPqsfoNY3fElxsvYsWWKcMtqiDH7V/exec';

    // Khởi tạo
    async function init() {
        // Tạm hiển thị link từ local trước để UI mượt
        const currentUrl = localStorage.getItem('videoConfigUrl');
        document.getElementById('videoUrl').value = currentUrl || defaultVideoUrl;

        // Tải cấu hình mới nhất từ server
        try {
            const response = await fetch(APP_SCRIPT_URL);
            const data = await response.json();
            if(data && data.url) {
                document.getElementById('videoUrl').value = data.url;
                localStorage.setItem('videoConfigUrl', data.url);
            }
        } catch (err) {
            console.error("Lỗi lấy cấu hình:", err);
        }
        
        // Dọn dẹp lịch sử cũ hơn 30 ngày
        cleanOldHistory();
    }

    // Logic Quản lý Lịch sử
    function getHistory() {
        const historyData = localStorage.getItem('videoConfigHistory');
        return historyData ? JSON.parse(historyData) : [];
    }

    function saveHistory(url) {
        const history = getHistory();
        const now = new Date();
        
        // Thêm vào đầu danh sách
        history.unshift({
            url: url,
            timestamp: now.getTime(),
            dateString: now.toLocaleString('vi-VN')
        });

        localStorage.setItem('videoConfigHistory', JSON.stringify(history));
    }

    function cleanOldHistory() {
        let history = getHistory();
        const thirtyDaysInMs = 30 * 24 * 60 * 60 * 1000;
        const now = new Date().getTime();
        
        // Lọc giữ lại những bản ghi trong vòng 30 ngày
        history = history.filter(item => (now - item.timestamp) <= thirtyDaysInMs);
        
        localStorage.setItem('videoConfigHistory', JSON.stringify(history));
    }

    // Hành động lưu cấu hình
    async function saveConfig() {
        const url = document.getElementById('videoUrl').value.trim();
        const currentUrl = localStorage.getItem('videoConfigUrl') || defaultVideoUrl;
        
        if(url) {
            const btn = document.querySelector('.btn-primary');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Đang lưu...';
            btn.disabled = true;

            try {
                // Chỉ lưu nếu URL thực sự thay đổi hoặc lưu lần đầu
                if(url !== currentUrl || !localStorage.getItem('videoConfigUrl')) {
                    // Gửi lên Server Apps Script
                    await fetch(APP_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ url: url }),
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8' // Dùng text/plain để tránh lỗi CORS preflight
                        }
                    });

                    localStorage.setItem('videoConfigUrl', url);
                    saveHistory(url);
                }
                
                const msg = document.getElementById('successMsg');
                msg.style.display = 'flex';
                setTimeout(() => {
                    msg.style.display = 'none';
                }, 3500);
            } catch (err) {
                alert("Có lỗi xảy ra khi lưu lên server: " + err.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        } else {
            alert('Vui lòng nhập đường dẫn video hợp lệ.');
        }
    }

    function logout() {
        sessionStorage.removeItem('isAdminLoggedIn');
        window.location.href = 'login.html';
    }

    // Điều khiển Modal
    function openHistoryModal() {
        const modal = document.getElementById('historyModal');
        const tbody = document.getElementById('historyTableBody');
        const history = getHistory();

        tbody.innerHTML = '';

        if (history.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" class="empty-history">Chưa có lịch sử thay đổi nào.</td></tr>';
        } else {
            history.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${item.dateString}</strong></td>
                    <td><a href="${item.url}" target="_blank" style="color: #1890ff; text-decoration: none;">${item.url}</a></td>
                `;
                tbody.appendChild(tr);
            });
        }

        modal.style.display = 'flex';
    }

    function closeHistoryModal() {
        const modal = document.getElementById('historyModal');
        modal.style.display = 'none';
    }

    // Đóng modal khi click ra ngoài
    window.onclick = function(event) {
        const modal = document.getElementById('historyModal');
        if (event.target == modal) {
            closeHistoryModal();
        }
    }

    // Chạy khởi tạo
    init();

</script>

</body>
</html>
